<html>
<head>
<title>Function for area calculation</title>
</head>
<body>
    <h1>Area Calculation and Greet</h1>
    <script>
        function calculateArea (length, width) {
    return length * width;
}
const calculateAreaArrow = (length, width) => length * width;
const gardenArea = calculateAreaArrow(12,6);
const message = ` This garden has an area of ${gardenArea} square meters.`;

console.log(message);

function greet(name){
    console.log (`Hello, ${name}! Welcome back.`);
}
greet ("Ghilman");
    </script>

</body>
