<!DOCTYPE html>
<head>
<title>let and const Example</title>
</head>
<body>

    <h1>JavaScript let and const Demo</h1>
    <p>Open the browser console (F12 → Console) to see the output.</p>

    <script>
        const ghilmanName = "Ghilman";
        let ahmadAge = 24;

        ahmadAge = 34;

        console.log(ghilmanName);
        console.log(ahmadAge);

    </script>

</body>
</html>
